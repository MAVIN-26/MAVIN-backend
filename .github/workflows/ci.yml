  name: CI

  on:
    push:
      branches: [develop, main]
    pull_request:
      branches: [develop, main]

  jobs:
    lint-and-test:
      runs-on: ubuntu-latest

      services:
        postgres:
          image: postgres:16
          env:
            POSTGRES_USER: mavin
            POSTGRES_PASSWORD: mavin
            POSTGRES_DB: mavin_test
          ports: ["5432:5432"]
          options: >-
            --health-cmd pg_isready
            --health-interval 10s
            --health-timeout 5s
            --health-retries 5

      env:
        DATABASE_URL: postgresql://mavin:mavin@localhost:5432/mavin_test

      steps:
        - uses: actions/checkout@v4

        - uses: actions/setup-python@v5
          with:
            python-version: "3.12"
            cache: pip

        - run: pip install -r requirements.txt

        - name: Install ruff
          run: pip install ruff

        - name: Lint
          run: ruff check .

        - name: Tests
          run: |
            if [ -d "tests" ] && [ -n "$(ls tests/)" ]; then
              pytest tests/
            else
              echo "No tests found, skipping."
            fi
